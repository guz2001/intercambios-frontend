<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Intercambios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<header>
        <h1>Apliacion web para la Lista de Intercambios</h1>
        <nav >
            <li >
                <a id="navegacion1" href="./index.html"><i class="fas fa-utensils"></i> Lista de alimentos</a>
                <a id="navegacion1" href="./calculadora.html"><i class="fas fa-calculator"></i> Calculadora</a>
            </li>
        </nav>
        
</header>

<main class="container">
    <div class="card">
        <h2><i class="fas fa-layer-group"></i> ① Selecciona un grupo de alimentos</h2>
        <div class="grupos-grid" id="grupos-container">
            <div class="loading">Cargando grupos...</div>
        </div>
    </div>

    <section id="seccion-subgrupos">
        <div class="card">
            <h2><i class="fas fa-list-ul"></i> ② Selecciona un subgrupo</h2>
            <div class="subgrupos-list" id="subgrupos-container"></div>
        </div>
    </section>

    <section id="seccion-alimentos">
        <div class="card">
            <h2><i class="fas fa-apple-whole"></i> ③ Selecciona un alimento</h2>
            <div class="alimentos-grid" id="alimentos-container"></div>
        </div>
    </section>

    <section id="seccion-intercambios">
        <div class="card">
            <h2><i class="fas fa-right-left"></i> ④ Intercambios posibles</h2>
            <div id="seleccionado-container"></div>
            <div class="intercambios-grid" id="intercambios-container"></div>
        </div>
    </section>

    <div id="seccion-historial">
        <div class="card">
            <div class="historial-header">
                <h2><i class="fas fa-clock-rotate-left"></i> Historial de consultas</h2>
                <button id="btn-limpiar-historial" type="button" class="btn-limpiar"><i class="fas fa-trash-can"></i> Limpiar</button>
            </div>
            <div class="historial-grid" id="historial-container">
                <div class="empty">No hay consultas recientes.</div>
            </div>
        </div>
    </div>
</main>

<script src="../js/historial.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
