<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Requerimientos Energéticos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .gender-group {
            display: flex;
            gap: 20px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            font-weight: normal;
        }
        input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        .activity-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }
        .activity-info p {
            margin: 5px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        .result-note {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de TMB</h1>
        <p class="subtitle">Fórmula de Harris-Benedict</p>
        
        <form id="calculadoraForm">
            <div class="form-group">
                <label>Sexo:</label>
                <div class="gender-group">
                    <label class="radio-label">
                        <input type="radio" name="sexo" value="hombre" checked> Hombre
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sexo" value="mujer"> Mujer
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="edad">Edad (años):</label>
                <input type="number" id="edad" name="edad" min="1" max="150" required>
            </div>

            <div class="form-group">
                <label for="peso">Peso (kg):</label>
                <input type="number" id="peso" name="peso" min="1" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="altura">Altura (cm):</label>
                <input type="number" id="altura" name="altura" min="50" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="actividad">Nivel de Actividad:</label>
                <select id="actividad" name="actividad" required>
                    <option value="1.2">Sedentario (poco o ningún ejercicio)</option>
                    <option value="1.375">Actividad leve (1-3 días/semana)</option>
                    <option value="1.55">Actividad moderada (3-5 días/semana)</option>
                    <option value="1.725">Actividad intensa (6-7 días/semana)</option>
                    <option value="1.9">Actividad muy intensa (2 veces al día)</option>
                </select>
            </div>

            <div class="activity-info">
                <p><strong>TMB:</strong> Tasa Metabólica Basal (calorías en reposo)</p>
                <p><strong>GET:</strong> Gasto Energético Total (con factor de actividad)</p>
            </div>

            <button type="submit">Calcular</button>
        </form>

        <div class="result" id="resultado">
            <div class="result-label">Tasa Metabólica Basal (TMB)</div>
            <div class="result-value" id="tmb">0</div>
            <div class="result-label">Gasto Energético Total (GET)</div>
            <div class="result-value" id="get">0</div>
            <div class="result-note">Calorías diarias recomendadas según tu actividad</div>
        </div>
    </div>

    <script>
        document.getElementById('calculadoraForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const sexo = document.querySelector('input[name="sexo"]:checked').value;
            const edad = parseFloat(document.getElementById('edad').value);
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value);
            const actividad = parseFloat(document.getElementById('actividad').value);

            let tmb;

            if (sexo === 'hombre') {
                tmb = 88.362 + (13.397 * peso) + (4.799 * altura) - (5.677 * edad);
            } else {
                tmb = 447.593 + (9.247 * peso) + (3.098 * altura) - (4.330 * edad);
            }

            const get = tmb * actividad;

            document.getElementById('tmb').textContent = Math.round(tmb);
            document.getElementById('get').textContent = Math.round(get);
            document.getElementById('resultado').classList.add('show');
        });
    </script>
</body>
</html>
